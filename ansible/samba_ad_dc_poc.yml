---
- name: FARM Samba AD DC PoC
  hosts: "{{ target_hosts | default('farm2') }}"
  gather_facts: false
  vars:
    ad_realm: FARM.DECS.INTERNAL
    ad_dns_domain: farm.decs.internal
    ad_netbios_domain: FARM
    ad_dc_netbios_name: DC1
    ad_dc_fqdn: dc1.farm.decs.internal
    ad_dc_management_ip: 192.168.2.12
    ad_dc_storage_ip: 100.100.100.102
    ad_dc_service_ip: "{{ ad_dc_storage_ip }}"
    ad_dc_stale_ip: "{{ ad_dc_management_ip }}"
    ad_dc_samba_interfaces: lo eno2
    ad_dns_forwarder: 210.94.190.7
    nas_fqdn: nas.farm.decs.internal
    nas_storage_ip: 100.100.100.120
    ad_nfs_client_netbios_name: FARM2
    ad_nfs_client_fqdn: farm2.farm.decs.internal
    ad_nfs_client_service_ip: "{{ ad_dc_storage_ip }}"
    ad_nfs_client_keytab: /etc/krb5.keytab
    ad_admin_password_file: /root/samba-ad-dc-poc.adminpass

  tasks:
    - name: Install Samba AD DC packages
      become: true
      ansible.builtin.apt:
        name:
          - acl
          - attr
          - dnsutils
          - krb5-user
          - samba
          - winbind
        state: present
        update_cache: true

    - name: Check existing Samba AD database
      become: true
      ansible.builtin.stat:
        path: /var/lib/samba/private/sam.ldb
      register: samba_ad_db

    - name: Create root-only PoC Administrator password
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        if [ ! -s {{ ad_admin_password_file | quote }} ]; then
          umask 077
          printf 'KrbPoc260619!%s\n' "$(openssl rand -hex 8)" > {{ ad_admin_password_file | quote }}
        fi
      args:
        executable: /bin/bash
        creates: "{{ ad_admin_password_file }}"

    - name: Stop standalone Samba services before provisioning
      become: true
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      failed_when: false
      loop:
        - smbd
        - nmbd
        - winbind
      when: not samba_ad_db.stat.exists

    - name: Back up package default smb.conf before provisioning
      become: true
      ansible.builtin.command:
        cmd: mv /etc/samba/smb.conf /etc/samba/smb.conf.before-ad-poc
        creates: /etc/samba/smb.conf.before-ad-poc
        removes: /etc/samba/smb.conf
      when: not samba_ad_db.stat.exists

    - name: Provision Samba AD DC
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        admin_pass="$(cat {{ ad_admin_password_file | quote }})"
        samba-tool domain provision \
          --server-role=dc \
          --use-rfc2307 \
          --dns-backend=SAMBA_INTERNAL \
          --realm={{ ad_realm | quote }} \
          --domain={{ ad_netbios_domain | quote }} \
          --host-name={{ ad_dc_netbios_name | lower | quote }} \
          --host-ip={{ ad_dc_service_ip | quote }} \
          --adminpass="$admin_pass" \
          --option="dns forwarder = {{ ad_dns_forwarder }}" \
          --option="interfaces = {{ ad_dc_samba_interfaces }}" \
          --option="bind interfaces only = yes"
      args:
        executable: /bin/bash
        creates: /var/lib/samba/private/sam.ldb
      when: not samba_ad_db.stat.exists

    - name: Ensure Samba AD interface binding is present
      become: true
      ansible.builtin.blockinfile:
        path: /etc/samba/smb.conf
        insertafter: '^\[global\]'
        marker: "# {mark} DECS AD DC POC"
        block: |
          interfaces = {{ ad_dc_samba_interfaces }}
          bind interfaces only = yes
          dns forwarder = {{ ad_dns_forwarder }}

    - name: Normalize Samba interface binding lines
      become: true
      ansible.builtin.replace:
        path: /etc/samba/smb.conf
        regexp: '^\s*interfaces\s*=.*$'
        replace: "interfaces = {{ ad_dc_samba_interfaces }}"

    - name: Install explicit Kerberos client config for PoC
      become: true
      ansible.builtin.copy:
        dest: /etc/krb5.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          [libdefaults]
            default_realm = {{ ad_realm }}
            dns_lookup_realm = false
            dns_lookup_kdc = false
            rdns = false
            ticket_lifetime = 24h
            renew_lifetime = 7d
            forwardable = true

          [realms]
            {{ ad_realm }} = {
              kdc = {{ ad_dc_service_ip }}
              admin_server = {{ ad_dc_service_ip }}
              default_domain = {{ ad_dns_domain }}
            }

          [domain_realm]
            .{{ ad_dns_domain }} = {{ ad_realm }}
            {{ ad_dns_domain }} = {{ ad_realm }}

    - name: Add PoC host aliases for farm2
      become: true
      ansible.builtin.blockinfile:
        path: /etc/hosts
        marker: "# {mark} DECS SAMBA AD POC"
        block: |
          {{ ad_dc_service_ip }} {{ ad_dc_fqdn }} {{ ad_dc_netbios_name | lower }}
          {{ ad_dc_management_ip }} {{ ad_dc_netbios_name | lower }}-mgmt.{{ ad_dns_domain }}
          {{ nas_storage_ip }} {{ nas_fqdn }}

    - name: Enable Samba AD DC service
      become: true
      ansible.builtin.systemd:
        name: samba-ad-dc
        masked: false
        enabled: true
        state: started

    - name: Restart Samba AD DC after binding update
      become: true
      ansible.builtin.systemd:
        name: samba-ad-dc
        state: restarted

    - name: Ensure DC DNS A record points at service IP
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        admin_pass="$(cat {{ ad_admin_password_file | quote }})"
        if ! samba-tool dns query 127.0.0.1 {{ ad_dns_domain | quote }} {{ ad_dc_netbios_name | lower | quote }} A -U "Administrator%$admin_pass" 2>/dev/null | grep -q {{ ad_dc_service_ip | quote }}; then
          samba-tool dns add 127.0.0.1 {{ ad_dns_domain | quote }} {{ ad_dc_netbios_name | lower | quote }} A {{ ad_dc_service_ip | quote }} -U "Administrator%$admin_pass"
        fi
      args:
        executable: /bin/bash
      register: ensure_dc_a
      changed_when: "'Record added successfully' in ensure_dc_a.stdout"

    - name: Remove stale IP from DC DNS A record
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        admin_pass="$(cat {{ ad_admin_password_file | quote }})"
        if samba-tool dns query 127.0.0.1 {{ ad_dns_domain | quote }} {{ ad_dc_netbios_name | lower | quote }} A -U "Administrator%$admin_pass" 2>/dev/null | grep -q {{ ad_dc_stale_ip | quote }}; then
          samba-tool dns delete 127.0.0.1 {{ ad_dns_domain | quote }} {{ ad_dc_netbios_name | lower | quote }} A {{ ad_dc_stale_ip | quote }} -U "Administrator%$admin_pass"
        fi
      args:
        executable: /bin/bash
      register: remove_stale_dc_a
      changed_when: "'Record deleted successfully' in remove_stale_dc_a.stdout"

    - name: Remove stale IP from domain apex DNS A record
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        admin_pass="$(cat {{ ad_admin_password_file | quote }})"
        if samba-tool dns query 127.0.0.1 {{ ad_dns_domain | quote }} @ A -U "Administrator%$admin_pass" 2>/dev/null | grep -q {{ ad_dc_stale_ip | quote }}; then
          samba-tool dns delete 127.0.0.1 {{ ad_dns_domain | quote }} @ A {{ ad_dc_stale_ip | quote }} -U "Administrator%$admin_pass"
        fi
      args:
        executable: /bin/bash
      register: remove_stale_apex_a
      changed_when: "'Record deleted successfully' in remove_stale_apex_a.stdout"

    - name: Wait for Samba DNS and Kerberos ports
      ansible.builtin.wait_for:
        host: "{{ ad_dc_service_ip }}"
        port: "{{ item }}"
        timeout: 30
      loop:
        - 53
        - 88
        - 389

    - name: Ensure NAS DNS record exists in Samba internal DNS
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        admin_pass="$(cat {{ ad_admin_password_file | quote }})"
        if samba-tool dns query 127.0.0.1 {{ ad_dns_domain | quote }} nas A -U "Administrator%$admin_pass" >/dev/null 2>&1; then
          exit 0
        fi
        samba-tool dns add 127.0.0.1 {{ ad_dns_domain | quote }} nas A {{ nas_storage_ip | quote }} -U "Administrator%$admin_pass"
      args:
        executable: /bin/bash
      register: nas_dns_record
      changed_when: "'Record added successfully' in nas_dns_record.stdout"

    - name: Remove FARM2 NFS SPNs from DC account if left by manual debugging
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        for spn in \
          nfs/{{ ad_nfs_client_netbios_name }} \
          nfs/{{ ad_nfs_client_fqdn }} \
          HOST/{{ ad_nfs_client_netbios_name }} \
          HOST/{{ ad_nfs_client_fqdn }}; do
          samba-tool spn delete "$spn" "{{ ad_dc_netbios_name }}$" >/dev/null 2>&1 || true
        done
      args:
        executable: /bin/bash
      changed_when: false

    - name: Ensure FARM2 NFS client computer account exists
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        ccache=/tmp/decs-ad-admin.ccache
        admin_pass="$(cat {{ ad_admin_password_file | quote }})"
        printf '%s\n' "$admin_pass" | KRB5CCNAME="$ccache" kinit administrator >/dev/null
        unset admin_pass
        if KRB5CCNAME="$ccache" samba-tool computer show {{ ad_nfs_client_netbios_name | quote }} --use-kerberos=required >/dev/null 2>&1; then
          KRB5CCNAME="$ccache" kdestroy
          exit 0
        fi
        KRB5CCNAME="$ccache" samba-tool computer create {{ ad_nfs_client_netbios_name | quote }} \
          --ip-address={{ ad_nfs_client_service_ip | quote }} \
          --service-principal-name=HOST/{{ ad_nfs_client_netbios_name }} \
          --service-principal-name=HOST/{{ ad_nfs_client_fqdn }} \
          --service-principal-name=nfs/{{ ad_nfs_client_netbios_name }} \
          --service-principal-name=nfs/{{ ad_nfs_client_fqdn }} \
          --use-kerberos=required
        KRB5CCNAME="$ccache" kdestroy
      args:
        executable: /bin/bash
      register: farm2_computer_account
      changed_when: "'Computer' in farm2_computer_account.stdout or 'created successfully' in farm2_computer_account.stdout"

    - name: Ensure FARM2 NFS client account is enabled and has a password
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        ccache=/tmp/decs-ad-admin.ccache
        admin_pass="$(cat {{ ad_admin_password_file | quote }})"
        printf '%s\n' "$admin_pass" | KRB5CCNAME="$ccache" kinit administrator >/dev/null
        unset admin_pass
        account="$(
          KRB5CCNAME="$ccache" samba-tool computer show {{ ad_nfs_client_netbios_name | quote }} --use-kerberos=required
        )"
        pwd_last_set="$(printf '%s\n' "$account" | awk -F': ' '/^pwdLastSet:/ { print $2; exit }')"
        user_account_control="$(printf '%s\n' "$account" | awk -F': ' '/^userAccountControl:/ { print $2; exit }')"
        changed=0
        if [ "${pwd_last_set:-0}" = "0" ]; then
          KRB5CCNAME="$ccache" samba-tool user setpassword \
            --filter='sAMAccountName={{ ad_nfs_client_netbios_name }}$' \
            --random-password \
            --use-kerberos=required >/dev/null
          changed=1
        fi
        if [ $(( ${user_account_control:-0} & 2 )) -ne 0 ]; then
          KRB5CCNAME="$ccache" samba-tool user enable \
            --filter='sAMAccountName={{ ad_nfs_client_netbios_name }}$' \
            --use-kerberos=required >/dev/null
          changed=1
        fi
        KRB5CCNAME="$ccache" kdestroy
        echo "changed=$changed"
      args:
        executable: /bin/bash
      register: farm2_computer_password
      changed_when: "'changed=1' in farm2_computer_password.stdout"

    - name: Ensure FARM2 machine keytab can get a Kerberos ticket
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        principal='{{ ad_nfs_client_netbios_name }}$@{{ ad_realm }}'
        if [ -s {{ ad_nfs_client_keytab | quote }} ] && kinit -k -t {{ ad_nfs_client_keytab | quote }} "$principal" >/dev/null 2>&1; then
          kdestroy >/dev/null 2>&1 || true
          exit 0
        fi
        ccache=/tmp/decs-ad-admin.ccache
        admin_pass="$(cat {{ ad_admin_password_file | quote }})"
        printf '%s\n' "$admin_pass" | KRB5CCNAME="$ccache" kinit administrator >/dev/null
        unset admin_pass
        stamp="$(date +%Y%m%d%H%M%S)"
        if [ -e {{ ad_nfs_client_keytab | quote }} ]; then
          cp -a {{ ad_nfs_client_keytab | quote }} {{ (ad_nfs_client_keytab ~ '.decs-krb-poc.') | quote }}$stamp.bak
        fi
        tmp_keytab={{ (ad_nfs_client_keytab ~ '.decs-new') | quote }}
        rm -f "$tmp_keytab"
        KRB5CCNAME="$ccache" samba-tool domain exportkeytab "$tmp_keytab" \
          --principal='{{ ad_nfs_client_netbios_name }}$' \
          --use-kerberos=required
        install -o root -g root -m 0600 "$tmp_keytab" {{ ad_nfs_client_keytab | quote }}
        rm -f "$tmp_keytab"
        kinit -k -t {{ ad_nfs_client_keytab | quote }} "$principal"
        kdestroy
        KRB5CCNAME="$ccache" kdestroy
      args:
        executable: /bin/bash
      register: farm2_machine_keytab
      changed_when: "'Export one principal' in farm2_machine_keytab.stdout"

    - name: Restart rpc-gssd after machine keytab update
      become: true
      ansible.builtin.systemd:
        name: rpc-gssd
        enabled: true
        state: restarted
      when: farm2_machine_keytab.changed

    - name: Run AD DC smoke tests
      become: true
      ansible.builtin.shell: |
        set -euo pipefail
        admin_pass="$(cat {{ ad_admin_password_file | quote }})"
        samba-tool domain level show
        host -t SRV _ldap._tcp.{{ ad_dns_domain }} 127.0.0.1
        host {{ ad_dc_fqdn }} 127.0.0.1
        host {{ nas_fqdn }} 127.0.0.1
        printf '%s\n' "$admin_pass" | kinit administrator
        klist
        kdestroy
      args:
        executable: /bin/bash
      register: ad_smoke
      changed_when: false

    - name: Print AD DC PoC summary
      ansible.builtin.debug:
        msg:
          - "realm={{ ad_realm }}"
          - "domain={{ ad_dns_domain }}"
          - "dc={{ ad_dc_fqdn }} {{ ad_dc_service_ip }}"
          - "nas={{ nas_fqdn }} {{ nas_storage_ip }}"
          - "admin_password_file={{ ad_admin_password_file }}"
          - "{{ ad_smoke.stdout_lines }}"
