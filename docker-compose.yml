services:
    nfs_mysql:
        build:
            context: ./nfs_mysql
            dockerfile: Dockerfile
        container_name: nfs_mysql
        restart: unless-stopped
        ports:
            - "3307:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        env_file:
            - ./nfs_mysql/.env
        command:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci

volumes:
    mysql_data:
        driver: local
